<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AZ 영업지도</title>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=ec7bc6e64af739bb295e74161a8a069d&libraries=services"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#222536;
  --border:#2e3247; --text:#e8eaf0; --muted:#7b82a0;
  --red:#e84444; --green:#27ae60; --orange:#e67e22;
  --blue:#3b82f6; --accent:#5c6ef8;
}
body { font-family:-apple-system,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* 헤더 */
header { height:50px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 14px; gap:10px; flex-shrink:0; }
.logo { font-size:15px; font-weight:700; }
.logo span { color:var(--accent); }
.hdiv { width:1px; height:18px; background:var(--border); }
.legend { display:flex; gap:8px; }
.leg { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--muted); cursor:pointer; padding:2px 7px; border-radius:4px; transition:background .15s; }
.leg:hover { background:var(--surface2); }
.leg.off { opacity:.3; }
.dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.hright { margin-left:auto; font-size:11px; color:var(--muted); }

/* 레이아웃 */
.main { display:flex; flex:1; overflow:hidden; }

/* 사이드바 */
.sidebar { width:290px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; transition:width .3s; position:relative; }
.sb-sec { padding:10px 12px; border-bottom:1px solid var(--border); }
.sec-label { font-size:10px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }

/* 검색 */
.srch { position:relative; }
.srch input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:6px 10px 6px 28px; color:var(--text); font-size:12px; outline:none; }
.srch input:focus { border-color:var(--accent); }
.srch input::placeholder { color:var(--muted); }
.srch-ic { position:absolute; left:8px; top:50%; transform:translateY(-50%); font-size:12px; color:var(--muted); }

/* 탭 */
.tabs { display:flex; gap:4px; margin-bottom:7px; }
.tab { flex:1; padding:5px; background:none; border:1px solid var(--border); border-radius:5px; color:var(--muted); font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:3px; transition:all .15s; }
.tab.on { background:var(--surface2); border-color:var(--accent); color:var(--text); }
.tdot { width:7px; height:7px; border-radius:50%; }

/* 목록 */
.clist { flex:1; overflow-y:auto; }
.clist::-webkit-scrollbar { width:3px; }
.clist::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.ci { display:flex; align-items:flex-start; gap:7px; padding:6px 12px; cursor:pointer; border-left:2px solid transparent; transition:background .1s; }
.ci:hover { background:var(--surface2); }
.ci.sel { background:var(--surface2); border-left-color:var(--accent); }
.chk { width:14px; height:14px; border:1.5px solid var(--border); border-radius:3px; flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.ci.sel .chk { background:var(--accent); border-color:var(--accent); }
.chk::after { content:''; display:none; width:7px; height:4px; border-left:1.5px solid white; border-bottom:1.5px solid white; transform:rotate(-45deg) translateY(-1px); }
.ci.sel .chk::after { display:block; }
.ci-info { flex:1; min-width:0; }
.ci-name { font-size:12px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:1px; }
.ci-addr { font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ci-mgr { font-size:10px; color:var(--muted); }
.badge { font-size:9px; padding:1px 5px; border-radius:3px; flex-shrink:0; font-weight:600; }
.b-act  { background:rgba(59,130,246,.15); color:var(--blue); }
.b-new  { background:rgba(39,174,96,.15);  color:var(--green); }
.b-dorm { background:rgba(136,136,136,.15); color:#888888; }
.empty { padding:16px 12px; text-align:center; color:var(--muted); font-size:12px; }

/* 경로 */
.route-sec { padding:10px 12px; border-top:1px solid var(--border); flex-shrink:0; }
.sel-cnt { font-size:11px; color:var(--muted); margin-bottom:7px; }
.sel-cnt span { color:var(--accent); font-weight:600; }
.btn-route { width:100%; padding:8px; background:var(--accent); border:none; border-radius:6px; color:white; font-size:13px; font-weight:600; cursor:pointer; transition:opacity .15s; }
.btn-route:hover { opacity:.85; }
.btn-route:disabled { opacity:.35; cursor:not-allowed; }
.btn-clear { width:100%; padding:5px; background:none; border:1px solid var(--border); border-radius:6px; color:var(--muted); font-size:11px; cursor:pointer; margin-top:5px; }
.btn-clear:hover { border-color:var(--red); color:var(--red); }
.rlist { margin-top:7px; max-height:140px; overflow-y:auto; }
.rlist::-webkit-scrollbar { width:3px; }
.rstep { display:flex; align-items:center; gap:7px; padding:4px 0; font-size:11px; }
.snum { width:17px; height:17px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; flex-shrink:0; }
.snum.company { background:var(--muted); }
.sname { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* 지도 */
.map-wrap { flex:1; position:relative; }
#map { width:100%; height:100%; }

/* 카테고리 바 */
.cat-bar { position:absolute; top:12px; left:50%; transform:translateX(-50%); margin-left:80px; z-index:5; display:flex; gap:5px; background:var(--surface); padding:6px 8px; border-radius:10px; border:1px solid var(--border); box-shadow:0 4px 20px rgba(0,0,0,.4); flex-wrap:wrap; justify-content:center; max-width:calc(100% - 32px); }
.cat { padding:4px 11px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--muted); font-size:12px; cursor:pointer; transition:all .15s; white-space:nowrap; }
.cat:hover { border-color:var(--blue); color:var(--text); }
.cat.on { background:var(--blue); border-color:var(--blue); color:white; font-weight:600; }
.cat.loading { opacity:.6; cursor:wait; }

/* 인포윈도우 */
.iw { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 12px; min-width:170px; max-width:230px; box-shadow:0 4px 16px rgba(0,0,0,.5); }
.iw-name { font-size:13px; font-weight:600; margin-bottom:3px; color:#e8eaf0; }
.iw-addr { font-size:10px; color:#7b82a0; margin-bottom:5px; line-height:1.4; }
.iw-row { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
.iw-badge { font-size:9px; font-weight:600; padding:1px 5px; border-radius:3px; }
.iw-mgr { font-size:10px; color:#7b82a0; }
.iw-top5 { margin-top:6px; font-size:10px; color:#7b82a0; border-top:1px solid #2e3247; padding-top:5px; line-height:1.6; }
.iw-top5 b { color:#e8eaf0; display:block; margin-bottom:2px; }

/* 지역 선택 바 */
.region-bar { position:absolute; top:12px; left:12px; z-index:5; display:flex; gap:6px; }
.region-group { position:relative; }
.region-btn { padding:5px 14px; background:var(--surface); border:1px solid var(--border); border-radius:20px; color:var(--text); font-size:12px; cursor:pointer; transition:all .15s; white-space:nowrap; box-shadow:0 2px 8px rgba(0,0,0,.3); }
.region-btn:hover, .region-btn.on { background:var(--accent); border-color:var(--accent); font-weight:600; }
.region-dropdown { position:absolute; top:calc(100% + 6px); left:0; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:6px; min-width:160px; max-height:300px; overflow-y:auto; box-shadow:0 4px 16px rgba(0,0,0,.4); visibility:hidden; opacity:0; z-index:10; grid-template-columns:1fr 1fr; gap:3px; display:grid; }
.region-group.open .region-dropdown { visibility:visible; opacity:1; }
.sub-btn { padding:4px 8px; background:none; border:1px solid var(--border); border-radius:5px; color:var(--muted); font-size:11px; cursor:pointer; transition:all .15s; text-align:center; white-space:nowrap; }
.sub-btn:hover, .sub-btn.on { background:var(--accent); border-color:var(--accent); color:white; }

/* 로딩 */
.loading { position:absolute; inset:0; background:rgba(15,17,23,.85); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:20; gap:10px; }
.loading.hide { display:none; }
.spin { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.load-txt { font-size:12px; color:var(--muted); }

@media (max-width: 768px) {
  body { overflow:hidden; }

  /* 헤더 슬림 */
  header {
    height:44px; padding:0 10px; gap:6px;
    overflow-x:auto; overflow-y:hidden;
  }
  header::-webkit-scrollbar { display:none; }
  .logo { font-size:13px; flex-shrink:0; }
  .hdiv { display:none; }
  .legend { display:none; }
  .hright { font-size:10px; flex-shrink:0; white-space:nowrap; margin-left:auto; }

  /* PC 레이아웃 숨김 */
  .main { display:none !important; }

  /* 모바일 전용 레이아웃 */
  #mobile-layout {
    display:flex;
    flex-direction:column;
    height:calc(100vh - 44px);
    position:relative;
  }

  /* 지도 영역 */
  #mobile-map {
    flex:1;
    position:relative;
    min-height:0;
  }

  /* 탭바 */
  #mobile-tabbar {
    height:60px;
    background:var(--surface);
    border-top:1px solid var(--border);
    display:flex;
    flex-shrink:0;
    z-index:10;
  }
  .m-tab {
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:3px;
    cursor:pointer;
    border:none;
    background:none;
    color:var(--muted);
    font-size:10px;
    transition:color .15s;
    position:relative;
  }
  .m-tab.active { color:#5c6ef8; }
  .m-tab.active::before {
    content:'';
    position:absolute;
    top:0;left:20%;right:20%;
    height:2px;
    background:#5c6ef8;
    border-radius:0 0 3px 3px;
  }
  .m-tab i { font-size:22px; }

  /* 패널들 */
  .m-panel {
    position:absolute;
    bottom:0; left:0; right:0;
    background:var(--surface);
    border-top:1px solid var(--border);
    border-radius:16px 16px 0 0;
    z-index:8;
    display:none;
    flex-direction:column;
    max-height:60vh;
    overflow:hidden;
  }
  .m-panel.active { display:flex; }

  .m-panel-handle {
    width:36px; height:4px;
    background:var(--border);
    border-radius:2px;
    margin:10px auto 0;
    flex-shrink:0;
  }

  .m-panel-header {
    padding:10px 16px 8px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
    border-bottom:1px solid var(--border);
  }
  .m-panel-title {
    font-size:14px;
    font-weight:600;
    color:var(--text);
  }

  .m-panel-body {
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:8px 0;
  }
  .m-panel-body::-webkit-scrollbar { display:none; }

  /* 지도 위 버튼들 */
  .m-map-controls {
    position:absolute;
    top:10px; left:10px; right:10px;
    z-index:5;
    display:flex;
    flex-direction:column;
    gap:6px;
    pointer-events:none;
  }
  .m-map-controls > * { pointer-events:auto; }

  /* 지역 버튼 */
  .m-region-bar {
    display:flex;
    gap:5px;
  }
  .m-region-btn {
    padding:5px 12px;
    background:rgba(15,17,23,0.85);
    border:none;
    border-radius:20px;
    color:white;
    font-size:12px;
    cursor:pointer;
    backdrop-filter:blur(4px);
  }
  .m-region-btn.active { background:#5c6ef8; }

  /* 카테고리 버튼 */
  .m-cat-bar {
    display:flex;
    gap:5px;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    padding-bottom:2px;
  }
  .m-cat-bar::-webkit-scrollbar { display:none; }
  .m-cat-btn {
    padding:5px 10px;
    background:rgba(15,17,23,0.85);
    border:none;
    border-radius:20px;
    color:white;
    font-size:12px;
    cursor:pointer;
    white-space:nowrap;
    backdrop-filter:blur(4px);
  }
  .m-cat-btn.active { background:#e84444; }

  /* GPS 버튼 */
  #m-gps-btn {
    position:absolute;
    bottom:16px; right:12px;
    width:44px; height:44px;
    border-radius:50%;
    background:white;
    border:0.5px solid var(--border);
    font-size:20px;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:5;
  }

  /* 검색 탭 */
  .m-search-wrap {
    padding:10px 14px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .m-search-wrap input {
    width:100%;
    padding:10px 14px;
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text);
    font-size:14px;
    outline:none;
  }
  .m-search-wrap input:focus { border-color:#5c6ef8; }

  /* 거래처 아이템 */
  .m-cust-item {
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 16px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    active:background:var(--surface2);
  }
  .m-cust-item:active { background:var(--surface2); }
  .m-cust-dot {
    width:10px; height:10px;
    border-radius:50%;
    flex-shrink:0;
  }
  .m-cust-info { flex:1; min-width:0; }
  .m-cust-name {
    font-size:14px;
    font-weight:500;
    color:var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .m-cust-sub {
    font-size:11px;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    margin-top:2px;
  }
  .m-badge {
    font-size:10px;
    padding:2px 7px;
    border-radius:4px;
    flex-shrink:0;
    font-weight:600;
  }
  .m-chk {
    width:22px; height:22px;
    border:1.5px solid var(--border);
    border-radius:5px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
  }
  .m-chk.checked {
    background:#5c6ef8;
    border-color:#5c6ef8;
    color:white;
  }

  /* 경로 탭 */
  .m-route-item {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 16px;
    border-bottom:1px solid var(--border);
  }
  .m-route-num {
    width:24px; height:24px;
    background:#5c6ef8;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    font-weight:700;
    color:white;
    flex-shrink:0;
  }
  .m-route-name {
    flex:1;
    font-size:13px;
    color:var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .m-route-btns {
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .m-route-btns button {
    background:none;
    border:1px solid var(--border);
    border-radius:4px;
    color:var(--muted);
    cursor:pointer;
    padding:3px 8px;
    font-size:11px;
    line-height:1;
  }

  /* 영업계획 탭 */
  .m-plan-item {
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 16px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
  }
  .m-visit-circle {
    width:24px; height:24px;
    border-radius:50%;
    border:2px solid var(--border);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    transition:all .2s;
  }
  .m-visit-circle.done {
    background:#27ae60;
    border-color:#27ae60;
    color:white;
  }
  .m-plan-info { flex:1; min-width:0; }
  .m-plan-name {
    font-size:14px;
    font-weight:500;
    color:var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .m-plan-name.done { text-decoration:line-through; opacity:.5; }
  .m-plan-addr {
    font-size:11px;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    margin-top:2px;
  }

  /* 버튼 */
  .m-btn-primary {
    width:100%;
    padding:14px;
    background:#5c6ef8;
    border:none;
    border-radius:10px;
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
  }
  .m-btn-secondary {
    width:100%;
    padding:11px;
    background:none;
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--muted);
    font-size:13px;
    cursor:pointer;
  }

  /* 직접 등록 폼 */
  #m-add-form {
    padding:14px 16px;
    border-top:1px solid var(--border);
    flex-shrink:0;
    display:none;
  }
  #m-add-form.open { display:block; }
  #m-add-form input, #m-add-form select {
    width:100%;
    padding:10px 12px;
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    font-size:13px;
    outline:none;
    margin-bottom:6px;
  }

  /* TOP5 숨김 */
  .iw-top5 { display:none !important; }

  /* 진행률 */
  .m-progress-bar {
    height:6px;
    background:var(--border);
    border-radius:3px;
    overflow:hidden;
    margin:6px 0;
  }
  .m-progress-fill {
    height:100%;
    background:#27ae60;
    border-radius:3px;
    transition:width .3s;
  }

  /* 필터 탭 */
  .m-filter-tabs {
    display:flex;
    gap:6px;
    padding:8px 16px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .m-filter-tab {
    padding:5px 12px;
    border-radius:20px;
    font-size:12px;
    cursor:pointer;
    border:none;
    background:var(--surface2);
    color:var(--muted);
  }
  .m-filter-tab.active {
    background:#5c6ef8;
    color:white;
    font-weight:600;
  }

  /* 빈 상태 */
  .m-empty {
    padding:32px 16px;
    text-align:center;
    color:var(--muted);
    font-size:13px;
  }

  /* 지역 드롭다운 */
  .m-region-dropdown {
    position:absolute;
    top:calc(100% + 6px);
    left:0;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:6px;
    display:none;
    grid-template-columns:1fr 1fr;
    gap:4px;
    z-index:20;
    box-shadow:0 4px 16px rgba(0,0,0,.3);
    min-width:160px;
  }
  .m-region-group { position:relative; }
  .m-region-group.open .m-region-dropdown { display:grid; }
  .m-sub-btn {
    padding:7px 10px;
    background:none;
    border:1px solid var(--border);
    border-radius:6px;
    color:var(--muted);
    font-size:12px;
    cursor:pointer;
    text-align:center;
  }
  .m-sub-btn:active { background:var(--surface2); }
}

@media (min-width: 769px) {
  #mobile-layout { display:none !important; }
}
</style>
</head>
<body>

<!-- 로그인 오버레이 -->
<div id="auth-overlay" style="
  position:fixed;inset:0;background:#0f1117;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:9999;gap:12px;">
  <div style="font-size:24px;font-weight:700;color:#e8eaf0;margin-bottom:4px">AZ <span style="color:#5c6ef8">영업지도</span></div>

<script>
const USERS = {
  '송광훈':'12','강경현':'20','정기태':'26','이동현':'25',
  '서한결':'15','나규호':'35','김동국':'19','김미남':'17',
  '임치현':'02','신상명':'42','심규현':'10','류민상':'39',
  '조준헌':'44','백윤주':'41','황지환':'37','천경준':'43',
  '최선영':'31','김현우':'24','김준':'00','이우석':'00',
  '박정운':'01','AZ':'00'
};

const USER_LIST = ['송광훈','강경현','정기태','이동현','서한결','나규호',
  '김동국','김미남','임치현','신상명','심규현','류민상','조준헌','백윤주',
  '황지환','천경준','최선영','김현우','김준','이우석','박정운','AZ'];

function showSuggestions(val) {
  const box = document.getElementById('suggestions');
  if (!val) { box.style.display='none'; return; }
  const filtered = USER_LIST.filter(u => u.includes(val));
  if (!filtered.length) { box.style.display='none'; return; }
  box.innerHTML = filtered.map(u =>
    `<div onclick="selectUser('${u}')" style="padding:8px 16px;cursor:pointer;color:#e8eaf0;font-size:13px"
      onmouseover="this.style.background='#222536'" onmouseout="this.style.background=''">${u}</div>`
  ).join('');
  box.style.display='block';
}

function selectUser(name) {
  document.getElementById('id-input').value = name;
  hideSuggestions();
  document.getElementById('pw-input').focus();
}

function hideSuggestions() {
  document.getElementById('suggestions').style.display='none';
}

function checkLogin() {
  const id = document.getElementById('id-input').value.trim();
  const pw = document.getElementById('pw-input').value;
  const err = document.getElementById('pw-error');

  if (!id) { err.style.display='block'; err.textContent='이름을 입력해주세요.'; return; }
  if (!USER_LIST.includes(id)) { err.style.display='block'; err.textContent='등록되지 않은 이름입니다.'; return; }
  if (USERS[id] !== pw) { err.style.display='block'; err.textContent='비밀번호가 틀렸습니다.'; document.getElementById('pw-input').value=''; return; }

  err.style.display='none';
  document.getElementById('auth-overlay').style.display='none';
  localStorage.setItem('az_auth', '1');
  localStorage.setItem('az_user', id);
  window.AZ_USER = id;
  document.getElementById('hstatus').textContent = `${id} 님 | 데이터 로딩 중...`;
}

// 로컬스토리지에 저장된 이름 자동 입력
const savedUser = localStorage.getItem('az_user');
if (savedUser) {
  document.getElementById('id-input').value = savedUser;
}

// 세션 유지
if (localStorage.getItem('az_auth') === '1') {
  document.getElementById('auth-overlay').style.display='none';
  window.AZ_USER = localStorage.getItem('az_user');
}
</script>

// ── CSV 파싱 ──
function parseCSV(txt) {
  const rows = parseCSVRaw(txt);
  if (rows.length < 2) return [];
  const hdrs = rows[0].map(h => h.trim());
  return rows.slice(1)
    .filter(r => r.some(v => v.trim()))
    .map(vals => {
      const obj = {};
      hdrs.forEach((h,i) => { obj[h] = (vals[i]||'').trim(); });
      return obj;
    }).filter(r => r['거래처명']);
}

// RFC 4180 완전 준수 CSV 파서
function parseCSVRaw(txt) {
  const rows = [];
  let row = [], cur = '', inQ = false;
  const s = txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n');

  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (inQ) {
      if (ch === '"') {
        if (s[i+1] === '"') { cur += '"'; i++; }
        else inQ = false;
      } else {
        cur += ch;
      }
    } else {
      if (ch === '"') {
        inQ = true;
      } else if (ch === ',') {
        row.push(cur); cur = '';
      } else if (ch === '\n') {
        row.push(cur); cur = '';
        rows.push(row); row = [];
      } else {
        cur += ch;
      }
    }
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

function splitLine(line) {
  return parseCSVRaw(line)[0] || [];
}

// ── 마커 표시 (좌표 컬럼 기반) ──
// 신규영업처 시트 → 지도 마커
async function loadProspectMarkers() {
  try {
    const res = await fetch(WEBAPP_URL + '?action=getProspects');
    const json = await res.json();
    if (!json.success || !json.data.length) return;

    json.data.forEach(item => {
      const lat = parseFloat(item['위도']);
      const lng = parseFloat(item['경도']);
      if (!lat || !lng) return;

      // 등록된 신규영업처 - 주황 테두리 빨간 마커
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"><circle cx="8" cy="8" r="6" fill="#e84444" stroke="#f59e0b" stroke-width="2"/></svg>`;
      const url = URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
      const m = new kakao.maps.Marker({
        position: new kakao.maps.LatLng(lat, lng),
        map: visible.search ? map : null,
        image: new kakao.maps.MarkerImage(url, new kakao.maps.Size(16,16), {offset:new kakao.maps.Point(8,8)})
      });

      kakao.maps.event.addListener(m, 'click', () => {
        if(curIW) { try{curIW.close();}catch(e){curIW.setMap(null);} curIW=null; }
        const cat     = item['카테고리']||'신규영업처';
        const visited = item['방문여부']===true || item['방문여부']==='TRUE';
        const memo    = item['메모']||'';
        const overlay = new kakao.maps.CustomOverlay({
          position: new kakao.maps.LatLng(lat, lng),
          content: buildProspectIW(item['업체명'], item['주소']||'', cat, lat, lng, true, visited, memo, ''),
          yAnchor: 1.3, zIndex: 10
        });
        overlay.setMap(map);
        curIW = overlay;
      });
      markers.search.push(m);
    });
  } catch(e) {
    console.log('신규영업처 로드 실패:', e);
  }
}

function getTop5(name) {
  const r = top5[normName(name)];

}

// ── 목록 렌더링 ──
function renderList() {
  const q = document.getElementById('srch').value.toLowerCase();
  const myName = window.AZ_USER || localStorage.getItem('az_user') || '';

  // 전체 데이터에서 우선순위 정렬
  // ① 검색어 매칭 전체
  // ② 현재 지역 + 내 담당
  // ③ 현재 지역 + 타 담당
  // ④ 타지역 + 내 담당
  // ⑤ 나머지 전체
  const isMatch    = r => !q || (r['거래처명']||'').toLowerCase().includes(q);
  const isInBounds = r => r._inBounds !== false;
  const isMine     = r => myName && (r['담당자']||'').includes(myName);

  let items;
  if (q) {
    // 검색어 있으면: 기존+신규+휴면 전체에서 검색, 내 담당 먼저
    const allData = [...data.active, ...data.new, ...data.dormant];
    const matched = allData.filter(isMatch);
    const myMatched    = matched.filter(isMine);
    const otherMatched = matched.filter(r => !isMine(r));
    items = [...myMatched, ...otherMatched];
  } else {
    // 검색어 없으면: 현재 탭 기준 우선순위
    const all = data[curTab];
    const g1 = all.filter(r => isInBounds(r) && isMine(r));
    const g2 = all.filter(r => isInBounds(r) && !isMine(r));
    const g3 = all.filter(r => !isInBounds(r) && isMine(r));
    const g4 = all.filter(r => !isInBounds(r) && !isMine(r));
    items = [...g1, ...g2, ...g3, ...g4];
  }
  const el = document.getElementById('clist');

  if (!items.length) { el.innerHTML='<div class="empty">검색 결과 없음</div>'; return; }

  const bc = curTab==='active'?'b-act':curTab==='new'?'b-new':'b-dorm';
  const lb = curTab==='active'?'기존':curTab==='new'?'신규':'휴면';

  // 선택된 거래처 상단 고정
  const selItems = selected.filter(s => s._sid && s._sid.startsWith(curTab));
  
  // searchSelected도 상단에 표시
  const searchSelHtml = searchSelected.length && curTab === 'active' ? `
    <div style="padding:4px 12px;font-size:10px;color:#e84444;font-weight:600;letter-spacing:.5px">
      🔴 카테고리 선택 ${searchSelected.length}개
    </div>` + searchSelected.map((item, i) => {
      return `<div class="ci sel" onclick="removeSearchSel(${i})">
        <div class="chk" style="background:#e84444;border-color:#e84444"></div>
        <div class="ci-info">
          <div class="ci-name">${item['거래처명']}</div>
          <div class="ci-addr">${item['주소']||''}</div>
        </div>
        <span class="badge" style="background:rgba(232,68,68,.15);color:#e84444">검색</span>
      </div>`;
    }).join('') + `<div style="height:1px;background:var(--border);margin:4px 0"></div>` : '';

  const selHtml = selItems.length ? `
    <div style="padding:4px 12px;font-size:10px;color:var(--accent);font-weight:600;letter-spacing:.5px">
      ✅ 선택됨 ${selItems.length}개
    </div>` + selItems.map(item => {
      const id = item._sid;
      const i = parseInt(id.split('_')[1]);
      const mgr = item['담당자']||'';
      const date = item['마지막거래일']||'';
      return `<div class="ci sel" onclick="toggleSel('${curTab}',${i})">
        <div class="chk"></div>
        <div class="ci-info">
          <div class="ci-name">${item['거래처명']}</div>
          <div class="ci-addr">${item['주소']||''}</div>
          ${mgr||date?`<div class="ci-mgr">${mgr}${mgr&&date?' · ':''}${date}</div>`:''}
        </div>
        <span class="badge ${bc}">${lb}</span>
      </div>`;
    }).join('') + `<div style="height:1px;background:var(--border);margin:4px 0"></div>` : '';

  // 선택 안 된 항목만 아래 표시 (이미 선택된 건 위에 표시했으므로)
  const unselItems = items.filter(item => {
    const idx = data[curTab].indexOf(item);
    const id = curTab+'_'+idx;
    return !selected.some(s=>s._sid===id);
  });

  // 구분선 (검색어 없을 때만)
  const myName2 = myName;
  const myUnsel = !q ? unselItems.filter(r => myName2 && (r['담당자']||'').includes(myName2)) : [];
  const otherUnsel = !q ? unselItems.filter(r => !myName2 || !(r['담당자']||'').includes(myName2)) : unselItems;

  const myLabel = !q && myUnsel.length && myName2 ?
    `<div style="padding:3px 12px;font-size:9px;font-weight:600;color:var(--accent);letter-spacing:.5px">⭐ 내 담당 거래처</div>` : '';
  const otherLabel = !q && otherUnsel.length && myUnsel.length && myName2 ?
    `<div style="padding:3px 12px;font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.5px;border-top:1px solid var(--border);margin-top:2px">기타 거래처</div>` : '';

  const renderItem = (item) => {
    // 검색 시 어느 탭 데이터인지 판별
    let itemType = curTab;
    let itemIdx = data[curTab].indexOf(item);
    if (q && itemIdx < 0) {
      if (data.active.indexOf(item) >= 0) { itemType='active'; itemIdx=data.active.indexOf(item); }
      else if (data.new.indexOf(item) >= 0) { itemType='new'; itemIdx=data.new.indexOf(item); }
      else if (data.dormant.indexOf(item) >= 0) { itemType='dormant'; itemIdx=data.dormant.indexOf(item); }
    }
    const id = `${itemType}_${itemIdx}`;
    const mgr = item['담당자']||'';
    const date = item['마지막거래일']||'';
    const typeBc = itemType==='active'?'b-act':itemType==='new'?'b-new':'b-dorm';
    const typeLb = itemType==='active'?'기존':itemType==='new'?'신규':'휴면';
    return `<div class="ci" onclick="toggleSel('${itemType}',${itemIdx})">
      <div class="chk"></div>
      <div class="ci-info">
        <div class="ci-name">${item['거래처명']}</div>
        <div class="ci-addr">${item['주소']||''}</div>
        ${mgr||date?`<div class="ci-mgr">${mgr}${mgr&&date?' · ':''}${date}</div>`:''}
      </div>
      <span class="badge ${typeBc}">${typeLb}</span>
    </div>`;
  };

  const bodyHtml = q 
    ? unselItems.map(renderItem).join('')  // 검색어: 그냥 순서대로
    : myLabel + myUnsel.map(renderItem).join('') + otherLabel + otherUnsel.map(renderItem).join('');

  el.innerHTML = searchSelHtml + selHtml + (unselItems.length ? bodyHtml : '<div class="empty">거래처 없음</div>');
}


// ── 카테고리 검색 ──
function searchCat(btn, catName, keywords) {
  curCatName = catName;
  if (curCatBtn === btn && btn.classList.contains('on')) { clearCat(); return; }
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  curCatBtn = btn;
  curCat = keywords;
  markers.search.forEach(m=>m.setMap(null));
  markers.search = [];
  doSearch(keywords);
}

// 대상 지역 bounds (광주/전남/전북)
const TARGET_BOUNDS = {
  minLat: 33.9,  // 제주 제외, 전남 최남단
  maxLat: 36.2,  // 전북 최북단
  minLng: 126.1, // 전남 서쪽 끝
  maxLng: 127.9  // 전북 동쪽 끝
};

function isInTargetRegion(lat, lng) {
  const la = parseFloat(lat);
  const lo = parseFloat(lng);
  return la >= TARGET_BOUNDS.minLat && la <= TARGET_BOUNDS.maxLat &&
         lo >= TARGET_BOUNDS.minLng && lo <= TARGET_BOUNDS.maxLng;
}

function doSearch(keywords) {
  markers.search.forEach(m=>m.setMap(null));
  markers.search = [];
  const center = map.getCenter();
  const opts = { location:center, radius:5000, size:15 };

  // 광주/전남/전북 좌표 범위
  const minLat=34.3, maxLat=35.95, minLng=126.1, maxLng=127.9;

  keywords.forEach(kw => {
    ps.keywordSearch(kw, (result, status) => {
      if (status !== kakao.maps.services.Status.OK) return;
      result.forEach(place => {
        const lat = parseFloat(place.y);
        const lng = parseFloat(place.x);

        // 광주/전남/전북 범위 밖이면 제외
        if (lat < minLat || lat > maxLat || lng < minLng || lng > maxLng) return;

        // 중복 제거
        const dup = markers.search.some(m => {
          const p = m.getPosition();
          return Math.abs(p.getLat()-lat)<0.0001 && Math.abs(p.getLng()-lng)<0.0001;
        });
        if (dup) return;

        const emoji = CAT_EMOJI[curCatName] || CAT_EMOJI['default'];
        const m = makeEmojiMarker(lat, lng, emoji, visible.search);
        // place 정보 저장
        m._place = place;
        m._category = curCatName;

        kakao.maps.event.addListener(m, 'click', () => {
          if(curIW) { try{curIW.setMap(null);}catch(e){} curIW=null; }
          const addr = place.road_address_name || place.address_name;
          const hours = place.opening_hours || '';
          const overlay = new kakao.maps.CustomOverlay({
            position: new kakao.maps.LatLng(lat, lng),
            content: buildProspectIW(place.place_name, addr, curCatName||'검색결과', lat, lng, false, false, '', hours),
            yAnchor: 1.3, zIndex: 10
          });
          overlay.setMap(map);
          curIW = overlay;
        });
        markers.search.push(m);
      });
    }, opts);
  });
}

function clearCat() {
  curCat=null; curCatBtn=null;
  markers.search.forEach(m=>m.setMap(null));
  markers.search=[];
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('on'));

// ── GPS 현재 위치 ──
let myLocationMarker = null;

function goToMyLocation() {
  const btn = document.getElementById('gps-btn');
  if (!navigator.geolocation) {
    alert('이 브라우저는 GPS를 지원하지 않습니다.');
    return;
  }
  btn.textContent = '⏳';
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const latlng = new kakao.maps.LatLng(lat, lng);

      // 지도 이동
      map.setCenter(latlng);
      map.setLevel(6);

      // 기존 내 위치 마커 제거
      if (myLocationMarker) myLocationMarker.setMap(null);

      // 내 위치 마커 (파란 원)
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20">
        <circle cx="10" cy="10" r="8" fill="#3b82f6" stroke="white" stroke-width="2" opacity="0.9"/>
        <circle cx="10" cy="10" r="3" fill="white"/>
      </svg>`;
      const url = URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
      myLocationMarker = new kakao.maps.Marker({
        position: latlng, map,
        image: new kakao.maps.MarkerImage(url, new kakao.maps.Size(20,20),
          {offset:new kakao.maps.Point(10,10)})
      });

      // 인포윈도우
      const iw = new kakao.maps.InfoWindow({
        content:'<div style="padding:5px 8px;font-size:12px;color:#1a1d27;font-weight:600">📍 내 현재 위치</div>',
        removable:true
      });
      iw.open(map, myLocationMarker);

      // 카테고리 활성화 시 현재 위치 기반 재검색
      if (curCat) doSearch(curCat);

      btn.textContent = '📍';
      setTimeout(filterListByBounds, 500);
    },
    err => {
      btn.textContent = '📍';
      alert('위치를 가져올 수 없습니다.\n위치 권한을 허용해주세요.');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// 지도 마커에서 경로 추가/제거
// ── 체크박스 선택 ──
function toggleSel(type, idx) {
  const item = data[type][idx];
  const id   = `${type}_${idx}`;
  item._sid  = id;
  const pos  = selected.findIndex(s=>s._sid===id);
  if (pos>=0) selected.splice(pos,1);
  else selected.push(item);

  const total = selected.length + searchSelected.length;
  document.getElementById('selcnt').textContent = total;
  document.getElementById('btnRoute').disabled = total === 0;
  renderList();
  renderRoute();

  const lat = parseFloat(item['위도']);
  const lng = parseFloat(item['경도']);
  if (lat && lng) map.panTo(new kakao.maps.LatLng(lat, lng));
}

function clearSelection() {
  selected = [];
  searchSelected = [];
  document.getElementById('selcnt').textContent = '0';
  document.getElementById('btnRoute').disabled = true;
  polylines.forEach(p=>p.setMap(null));
  polylines = [];
  document.getElementById('rlist').innerHTML = '';
  const existing = document.getElementById('btn-kakao-nav');
  if (existing) existing.remove();
  renderList();
}

function renderRoute() {
  const el = document.getElementById('rlist');
  const allSel = [
    ...selected,
    ...searchSelected.map(s=>({...s, 거래처명:s['거래처명']}))
  ];
  if (!allSel.length) { el.innerHTML=''; return; }

  el.innerHTML = allSel.map((s,i) => `
    <div class="rstep" id="rstep-${i}">
      <div class="snum">${i+1}</div>
      <div class="sname">${s['거래처명']}</div>
      <div style="display:flex;flex-direction:column;gap:1px;margin-left:auto">
        <button onclick="moveRoute(${i},-1)" style="
          background:none;border:1px solid var(--border);border-radius:3px;
          color:var(--muted);cursor:pointer;padding:0 5px;font-size:10px;line-height:16px"
          ${i===0?'disabled':''}>▲</button>
        <button onclick="moveRoute(${i},1)" style="
          background:none;border:1px solid var(--border);border-radius:3px;
          color:var(--muted);cursor:pointer;padding:0 5px;font-size:10px;line-height:16px"
          ${i===allSel.length-1?'disabled':''}>▼</button>
      </div>
    </div>`).join('');
}

function moveRoute(idx, dir) {
  const allSel = [
    ...selected,
    ...searchSelected
  ];
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= allSel.length) return;

  // selected와 searchSelected 합쳐서 순서 변경
  const merged = [...selected.map(s=>({...s,_src:'sel'})),
                  ...searchSelected.map(s=>({...s,_src:'search'}))];
  [merged[idx], merged[newIdx]] = [merged[newIdx], merged[idx]];

  selected = merged.filter(s=>s._src==='sel').map(({_src,...rest})=>rest);
  searchSelected = merged.filter(s=>s._src==='search').map(({_src,...rest})=>rest);

  renderRoute();
}

function toggleSelFromMap(type, idx) {
  toggleSel(type, idx);
  // 버튼 상태 업데이트
  const sid = type+'_'+idx;
  const btn = document.getElementById('iw-btn-'+sid);
  if (btn) {
    const isSel = selected.some(s=>s._sid===sid);
    btn.textContent = isSel ? '✅ 경로에 추가됨' : '📍 경로 추가';
    btn.style.background = isSel ? '#3b6ef8' : '#5c6ef8';
  }
}

// ── 영업계획 저장/불러오기 ──
async function savePlan() {
  const user = window.AZ_USER || localStorage.getItem('az_user');
  if (!user) { alert('로그인이 필요합니다.'); return; }

  const allSel = [
    ...selected.map(s => ({ name:s['거래처명'], address:s['주소'], type: s._sid?.split('_')[0]==='active'?'기존':s._sid?.split('_')[0]==='new'?'신규':'휴면' })),
    ...searchSelected.map(s => ({ name:s['거래처명'], address:s['주소'], type:'신규영업처' }))
  ];

  if (!allSel.length) { alert('선택된 거래처가 없습니다.'); return; }

  try {
    await fetch(WEBAPP_URL, {
      method:'POST',
      mode:'no-cors',
      body: JSON.stringify({ action:'savePlan', user, items:allSel })
    });
    alert(`영업계획 저장 완료 (${allSel.length}건)\n잠시 후 불러오기로 확인하세요.`);
  } catch(e) {
    alert('저장 실패: ' + e.message);
  }
}

async function loadPlan() {
  const user = window.AZ_USER || localStorage.getItem('az_user');
  if (!user) { alert('로그인이 필요합니다.'); return; }

  try {
    const res = await fetch(WEBAPP_URL + '?action=loadPlan&user=' + encodeURIComponent(user));
    const json = await res.json();
    if (!json.success || !json.data.length) { alert('오늘 저장된 영업계획이 없습니다.'); return; }

    // 기존 선택 초기화
    selected = []; searchSelected = [];

    // 완료/미완료 분리
    const done = json.data.filter(r => r['방문완료'] === true || r['방문완료'] === 'TRUE');
    const todo = json.data.filter(r => r['방문완료'] !== true && r['방문완료'] !== 'TRUE');

    // 불러온 거래처 매칭
    json.data.forEach(item => {
      const name = item['거래처명'];
      const type = item['유형'] === '기존' ? 'active' : item['유형'] === '신규' ? 'new' : item['유형'] === '휴면' ? 'dormant' : null;
      if (type) {
        const idx = data[type].findIndex(d => d['거래처명'] === name);
        if (idx >= 0) {
          const d = data[type][idx];
          d._sid = type+'_'+idx;
          d._visited = item['방문완료'] === true || item['방문완료'] === 'TRUE';
          selected.push(d);
        }
      } else {
        searchSelected.push({
          거래처명: name, 주소: item['주소'],
          위도: '', 경도: '', _pid: 'plan_'+Math.random().toString(36).substr(2,6),
          _visited: item['방문완료'] === true || item['방문완료'] === 'TRUE'
        });
      }
    });

    document.getElementById('selcnt').textContent = selected.length + searchSelected.length;
    document.getElementById('btnRoute').disabled = false;
    renderList();
    showPlanPanel(json.data, user);
    
  } catch(e) {
    alert('불러오기 실패: ' + e.message);
  }
}

function filterPlan(type) {
  const items = document.querySelectorAll('.plan-item');
  items.forEach(item => {
    const visited = item.dataset.visited === 'true';
    if (type === 'todo') {
      item.style.display = visited ? 'none' : 'flex';
    } else {
      item.style.display = 'flex';
    }
  });
  document.getElementById('plan-filter-all').style.background = type==='all' ? 'var(--accent)' : 'var(--surface2)';
  document.getElementById('plan-filter-all').style.color = type==='all' ? 'white' : 'var(--muted)';
  document.getElementById('plan-filter-todo').style.background = type==='todo' ? 'var(--accent)' : 'var(--surface2)';
  document.getElementById('plan-filter-todo').style.color = type==='todo' ? 'white' : 'var(--muted)';
}

async function toggleVisit(name, user, idx) {
  const items = document.querySelectorAll('.plan-item');
  const item = items[idx];
  const wasVisited = item.dataset.visited === 'true';
  const newVisited = !wasVisited;

  // UI 즉시 업데이트
  item.dataset.visited = newVisited;
  item.style.opacity = newVisited ? '0.5' : '1';
  const circle = item.querySelector('div > div');
  circle.style.border = `2px solid ${newVisited?'#27ae60':'var(--border)'}`;
  circle.style.background = newVisited ? '#27ae60' : 'transparent';
  circle.textContent = newVisited ? '✓' : '';
  const nameEl = item.querySelector('div:nth-child(2) div:first-child');
  nameEl.style.textDecoration = newVisited ? 'line-through' : 'none';
  nameEl.style.fontWeight = newVisited ? '400' : '600';

  // 진행률 업데이트
  const allItems = document.querySelectorAll('.plan-item');
  const done = [...allItems].filter(i => i.dataset.visited === 'true').length;
  const total = allItems.length;
  const panel = document.getElementById('plan-panel');
  if (panel) {
    panel.querySelector('div > div > div:last-child').textContent = done+'/'+total+' 완료';
    const bar = panel.querySelector('div[style*="background:#27ae60"]');
    if (bar) bar.style.width = (total?Math.round(done/total*100):0)+'%';
  }

  // 구글시트 업데이트
  try {
    await fetch(WEBAPP_URL, {
      method:'POST', mode:'no-cors',
      body: JSON.stringify({ action:'updateVisit', user, name, visited:newVisited })
    });
  } catch(e) { console.error('방문완료 업데이트 실패:', e); }
}

function toggleAddForm() {
  const form = document.getElementById('add-form');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
}

async function submitAddForm() {
  const name = document.getElementById('form-name').value.trim();
  const addr = document.getElementById('form-addr').value.trim();
  const cat  = document.getElementById('form-cat').value;
  const user = window.AZ_USER || localStorage.getItem('az_user') || 'AZ';

  if (!name || !addr) { alert('업체명과 주소를 입력해주세요.'); return; }

  // 카카오 주소 검색으로 좌표 변환
  const geocoder = new kakao.maps.services.Geocoder();
  geocoder.addressSearch(addr, async (result, status) => {
    let lat = '', lng = '';
    if (status === kakao.maps.services.Status.OK) {
      lat = result[0].y;
      lng = result[0].x;
      // 지도에 마커 표시
      const m = makeMarker(lat, lng, COLORS.search, visible.search);
      m._place = { place_name: name, road_address_name: addr };
      kakao.maps.event.addListener(m, 'click', () => {
        if(curIW) { try{curIW.close();}catch(e){curIW.setMap(null);} curIW=null; }
        const c = `<div class="iw">
          <div class="iw-name">${name}</div>
          <div class="iw-addr">${addr}</div>
          <span class="iw-badge" style="background:rgba(232,68,68,.15);color:#e84444">${cat}</span>
        </div>`;
        curIW = new kakao.maps.InfoWindow({content:c, removable:true});
        curIW.open(map, m);
      });
      markers.search.push(m);
      map.setCenter(new kakao.maps.LatLng(lat, lng));
    }

    // 구글시트 등록
    try {
      const res = await fetch(WEBAPP_URL, {
        method:'POST',
        mode:'no-cors',
        body: JSON.stringify({ action:'addProspect', name, address:addr, category:cat, lat, lng, registeredBy:user })
      });
      alert('등록 완료');
      toggleAddForm();
      document.getElementById('form-name').value = '';
      document.getElementById('form-addr').value = '';
    } catch(e) {
      alert('등록 실패: ' + e.message);
    }
  });
}

// ── 파란 마커 경로 추가 ──
// ── 경로 계산 ──
function calcRoute() {
  const valid = [
    ...selected.filter(s => parseFloat(s['위도']) && parseFloat(s['경도'])),
    ...searchSelected.filter(s => parseFloat(s['위도']) && parseFloat(s['경도']))
  ];
  if (!valid.length) { alert('선택한 거래처에 좌표 데이터가 없습니다.\nApps Script에서 [📍 좌표 일괄 변환]을 실행해주세요.'); return; }

  polylines.forEach(p=>p.setMap(null));
  polylines = [];

  const opt = nearestNeighbor(valid);
  const pts = [
    ...opt.map(s=>new kakao.maps.LatLng(parseFloat(s['위도']),parseFloat(s['경도'])))
  ];

  const pl = new kakao.maps.Polyline({
    path:pts, strokeWeight:3, strokeColor:'#5c6ef8',
    strokeOpacity:.8, strokeStyle:'solid', map
  });
  polylines.push(pl);

  const bounds = new kakao.maps.LatLngBounds();
  pts.forEach(p=>bounds.extend(p));
  map.setBounds(bounds);

  selected = opt.filter(s => s._sid);
  searchSelected = opt.filter(s => s._pid);
  renderRoute();
}

function nearestNeighbor(items) {
  const unvisited = [...items];
  const result = [];
  let cur = {위도:COMPANY.lat, 경도:COMPANY.lng};
  while (unvisited.length) {
    let minD=Infinity, minI=0;
    unvisited.forEach((item,i)=>{
      const d = Math.pow(parseFloat(item['위도'])-parseFloat(cur['위도']),2)
               +Math.pow(parseFloat(item['경도'])-parseFloat(cur['경도']),2);
      if(d<minD){minD=d;minI=i;}
    });
    cur = unvisited.splice(minI,1)[0];
    result.push(cur);
  }
  return result;
}

function addToRoute(pid) {
  if (!window._curPlace || window._curPlace.pid !== pid) return;
  const p = window._curPlace;

  const already = searchSelected.findIndex(s => s._pid === pid);
  if (already >= 0) {
    searchSelected.splice(already, 1);
    document.getElementById('btn-route-'+pid).textContent = '📍 경로 추가';
    document.getElementById('btn-route-'+pid).style.background = '#5c6ef8';
  } else {
    searchSelected.push({
      _pid: pid,
      거래처명: p.name,
      주소: p.addr,
      위도: p.lat,
      경도: p.lng,
      _type: 'search'
    });
    document.getElementById('btn-route-'+pid).textContent = '✅ 추가됨';
    document.getElementById('btn-route-'+pid).style.background = '#3b6ef8';
  }

  // 경로 선택 카운트 업데이트
  const total = selected.length + searchSelected.length;
  document.getElementById('selcnt').textContent = total;
  document.getElementById('btnRoute').disabled = total === 0;
}

// ── 영업처 등록 ──
async function registerProspect(name, addr, cat, lat, lng) {
  if (WEBAPP_URL === 'YOUR_WEBAPP_URL') {
    alert('Apps Script Web App URL을 설정해주세요.');
    return;
  }
  const user = window.AZ_USER || localStorage.getItem('az_user') || 'AZ';
  try {
    const res = await fetch(WEBAPP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ action:'addProspect', name, address:addr, category:cat, lat, lng, registeredBy:user })
    });
    alert('등록 완료');
  } catch(e) {
    alert('등록 실패: ' + e.message);
  }
}

// ── 지역 선택 ──
function toggleRegion(id) {
  const groups = document.querySelectorAll('.region-group');
  groups.forEach(g => {
    if (g.id === 'rg-'+id) g.classList.toggle('open');
    else g.classList.remove('open');
  });
}

function moveRegion(lat, lng, name) {
  map.setCenter(new kakao.maps.LatLng(lat, lng));
  // 광주 구단위는 7, 시단위는 8
  const level = (name.includes('구') || name.includes('동')) ? 8 : 9;
  map.setLevel(level);
  document.querySelectorAll('.region-group').forEach(g => g.classList.remove('open'));
  setTimeout(filterListByBounds, 500);
}

function filterListByBounds() {
  const bounds = map.getBounds();
  const sw = bounds.getSouthWest();
  const ne = bounds.getNorthEast();
  const swLat = sw.getLat(), swLng = sw.getLng();
  const neLat = ne.getLat(), neLng = ne.getLng();

  ['active','new','dormant'].forEach(t => {
    data[t].forEach(item => {
      const lat = parseFloat(item['위도']);
      const lng = parseFloat(item['경도']);
      if (!lat || !lng) {
        item._inBounds = false;
        return;
      }
      item._inBounds = lat >= swLat && lat <= neLat && lng >= swLng && lng <= neLng;
    });
  });
  renderList();
}

// 지도 이동 시 목록 자동 필터
kakao.maps.event.addListener(map, 'idle', filterListByBounds);
</script>

var mMobMarkers = { active:[], new2:[], dormant:[], search:[], prospect:[] };
var mPolylines2 = [];
var mCurIW2 = null;

function isMobile() { return window.innerWidth <= 768; }

function initMobile() {
  if (!isMobile()) return;
  var layout = document.getElementById('mobile-layout');
  if (!layout) return;
  layout.style.display = 'flex';
  layout.style.flexDirection = 'column';
  layout.style.height = 'calc(100vh - 44px)';

  mMap2 = new kakao.maps.Map(document.getElementById('map-mobile'), {
    center: new kakao.maps.LatLng(COMPANY.lat, COMPANY.lng),
    level: 8
  });

  // 본사 마커
  var companyEl = document.createElement('div');
  companyEl.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center"><div style="background:#5c6ef8;border:2px solid white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px">🏢</div><div style="background:#5c6ef8;color:white;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-top:2px;white-space:nowrap">AZ 본사</div></div>';
  new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(COMPANY.lat, COMPANY.lng),
    content: companyEl, yAnchor:1.2, map:mMap2
  });

  mPlaceAllMarkers();

  var srch = document.getElementById('m-srch');
  if (srch) srch.addEventListener('input', mRenderSearch);

  kakao.maps.event.addListener(mMap2, 'click', function() {
    if(mCurIW2) { try{mCurIW2.close();}catch(e){try{mCurIW2.setMap(null);}catch(e2){}} mCurIW2=null; }
  });

  kakao.maps.event.addListener(mMap2, 'idle', function() {
    if (mCurCat2) mDoSearch2(mCurCat2);
  });
}

function mPlaceAllMarkers() {
  // 배치 처리로 UI 블로킹 방지 (601개 마커를 한꺼번에 생성하면 렉 발생)
  var typeColors = { active:'#3b82f6', new:'#27ae60', dormant:'#888888' };
  var typeKeys = ['active','new','dormant'];
  var typeIdx = 0;
  var itemIdx = 0;
  var BATCH = 50; // 한 번에 50개씩 처리

  function processBatch() {
    var count = 0;
    while (typeIdx < typeKeys.length) {
      var type = typeKeys[typeIdx];
      if (!data[type]) { typeIdx++; itemIdx=0; continue; }
      while (itemIdx < data[type].length) {
        var item = data[type][itemIdx];
        var lat = parseFloat(item['위도']);
        var lng = parseFloat(item['경도']);
        itemIdx++;
        if (!lat || !lng) continue;
        var m = mMakeMarker2(lat, lng, typeColors[type]);
        (function(it, tp, ix){ kakao.maps.event.addListener(m, 'click', function(){ mShowIW2(m, it, tp, ix); }); })(item, type, typeIdx-1 === 0 ? itemIdx-1 : itemIdx-1);
        mMobMarkers[type === 'new' ? 'new2' : type].push(m);
        count++;
        if (count >= BATCH) {
          setTimeout(processBatch, 0);
          return;
        }
      }
      typeIdx++;
      itemIdx = 0;
    }
    // 모든 마커 처리 완료 후 신규영업처 로드
    mLoadProspectMarkers2();
  }
  processBatch();
}

function mMakeMarker2(lat, lng, color) {
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"><circle cx="9" cy="9" r="8" fill="'+color+'" stroke="white" stroke-width="2"/></svg>';
  var blob = new Blob([svg], {type:'image/svg+xml'});
  var url = URL.createObjectURL(blob);
  return new kakao.maps.Marker({
    position: new kakao.maps.LatLng(lat, lng), map: mMap2,
    image: new kakao.maps.MarkerImage(url, new kakao.maps.Size(18,18), {offset:new kakao.maps.Point(9,9)})
  });
}

function mMakeEmojiMarker2(lat, lng, emoji) {
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 34 34"><circle cx="17" cy="17" r="15" fill="white" stroke="#e84444" stroke-width="2"/><text x="17" y="23" text-anchor="middle" font-size="16">'+emoji+'</text></svg>';
  var blob = new Blob([svg], {type:'image/svg+xml'});
  var url = URL.createObjectURL(blob);
  return new kakao.maps.Marker({
    position: new kakao.maps.LatLng(lat, lng), map: mMap2,
    image: new kakao.maps.MarkerImage(url, new kakao.maps.Size(34,34), {offset:new kakao.maps.Point(17,17)})
  });
}

function mShowIW2(marker, item, type, idx) {
  if(mCurIW2){try{mCurIW2.close();}catch(e){try{mCurIW2.setMap(null);}catch(e2){}} mCurIW2=null;}
  var name = item['거래처명']||'';
  var addr = item['주소']||'';
  var mgr  = item['담당자']||'';
  var date = item['마지막거래일']||'';
  var bColor = type==='active'?'rgba(59,130,246,.15)':type==='new'?'rgba(39,174,96,.15)':'rgba(136,136,136,.15)';
  var tColor = type==='active'?'#3b82f6':type==='new'?'#27ae60':'#888';
  var label  = type==='active'?'기존':type==='new'?'신규':'휴면';
  var sid = type+'_'+idx;
  var isSel = selected.some(function(s){return s._sid===sid;});
  var c = '<div style="background:#1a1d27;border:1px solid #2e3247;border-radius:12px;padding:14px 16px;min-width:210px;max-width:270px;box-shadow:0 4px 20px rgba(0,0,0,.6)">'
    +'<div style="font-size:16px;font-weight:700;color:#e8eaf0;margin-bottom:4px">'+name+'</div>'
    +'<div style="font-size:12px;color:#7b82a0;margin-bottom:8px;line-height:1.4">'+addr+'</div>'
    +'<div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:12px">'
    +'<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;background:'+bColor+';color:'+tColor+'">'+label+'</span>'
    +(mgr?'<span style="font-size:11px;color:#7b82a0">'+mgr+'</span>':'')
    +(date?'<span style="font-size:11px;color:#7b82a0">· '+date+'</span>':'')
    +'</div>'
    +'<button onclick="mAddToRoute2(\''+type+'\','+idx+')" style="width:100%;padding:12px;background:'+(isSel?'#3b6ef8':'#5c6ef8')+';border:none;border-radius:8px;color:white;font-size:14px;font-weight:600;cursor:pointer">'
    +(isSel?'✅ 경로에 추가됨':'📍 경로 추가')
    +'</button></div>';
  mCurIW2 = new kakao.maps.InfoWindow({content:c, removable:true});
  mCurIW2.open(mMap2, marker);
}

function mAddToRoute2(type, idx) {
  if (idx < 0) return;
  var item = data[type][idx];
  var sid = type+'_'+idx;
  item._sid = sid;
  var pos = selected.findIndex(function(s){return s._sid===sid;});
  if (pos>=0) selected.splice(pos,1);
  else selected.push(item);
  mUpdateRouteCount2();
  mRenderRoute2();
  if(mCurIW2){try{mCurIW2.close();}catch(e){try{mCurIW2.setMap(null);}catch(e2){}} mCurIW2=null;}
}

function mUpdateRouteCount2() {
  var total = selected.length + searchSelected.length;
  var el = document.getElementById('m-route-count');
  if (el) el.textContent = total > 0 ? '경로 '+total : '경로';
  var sc = document.getElementById('m-sel-count');
  if (sc) sc.textContent = total+'개 선택';
  var btn = document.getElementById('m-btn-route');
  if (btn) btn.disabled = total === 0;
}

function mClearSelection2() {
  selected = []; searchSelected = [];
  mPolylines2.forEach(function(p){p.setMap(null);});
  mPolylines2 = [];
  mUpdateRouteCount2();
  mRenderRoute2();
}

function mRenderRoute2() {
  var el = document.getElementById('m-route-list');
  if (!el) return;
  var allSel = selected.concat(searchSelected);
  if (!allSel.length) {
    el.innerHTML = '<div class="m-empty">검색이나 지도에서 거래처를 선택하세요</div>';
    return;
  }
  el.innerHTML = allSel.map(function(s,i){
    return '<div class="m-route-item">'
      +'<div class="m-route-num">'+(i+1)+'</div>'
      +'<div class="m-route-name">'+s['거래처명']+'</div>'
      +'<div class="m-route-btns">'
      +'<button onclick="mMoveRoute2('+i+',-1)" '+(i===0?'disabled':'')+'>▲</button>'
      +'<button onclick="mMoveRoute2('+i+',1)" '+(i===allSel.length-1?'disabled':'')+'>▼</button>'
      +'</div></div>';
  }).join('');
}

function mMoveRoute2(idx, dir) {
  var merged = selected.map(function(s){return Object.assign({},s,{_src:'sel'});})
    .concat(searchSelected.map(function(s){return Object.assign({},s,{_src:'search'});}));
  var newIdx = idx+dir;
  if (newIdx<0||newIdx>=merged.length) return;
  var tmp = merged[idx]; merged[idx]=merged[newIdx]; merged[newIdx]=tmp;
  selected = merged.filter(function(s){return s._src==='sel';}).map(function(s){var r=Object.assign({},s);delete r._src;return r;});
  searchSelected = merged.filter(function(s){return s._src==='search';}).map(function(s){var r=Object.assign({},s);delete r._src;return r;});
  mRenderRoute2();
}

function mSwitchTab(tab) {
  mCurTab = tab;
  ['map','plan','search','route'].forEach(function(t) {
    var tb = document.getElementById('m-tab-'+t);
    if (tb) tb.classList.toggle('active', t===tab);
    if (t!=='map') {
      var p = document.getElementById('m-panel-'+t);
      if (p) p.classList.toggle('active', t===tab);
    }
  });
}

function mToggleRegion(id) {
  document.querySelectorAll('.m-region-group').forEach(function(g){
    if (g.id==='m-rg-'+id) g.classList.toggle('open');
    else g.classList.remove('open');
  });
}

function mMoveRegion(lat, lng, name) {
  document.querySelectorAll('.m-region-group').forEach(function(g){g.classList.remove('open');});
  var ps2 = new kakao.maps.services.Places();
  var searchName = name.includes('전주') ? '전주시 '+name.replace('전주-','') :
                   name.includes('구') ? '광주광역시 '+name : name+'시';
  ps2.keywordSearch(searchName, function(result, status) {
    if (status===kakao.maps.services.Status.OK && result.length>0) {
      var bounds = new kakao.maps.LatLngBounds();
      result.forEach(function(r){bounds.extend(new kakao.maps.LatLng(r.y,r.x));});
      mMap2.setBounds(bounds);
    } else {
      mMap2.setCenter(new kakao.maps.LatLng(lat,lng));
      mMap2.setLevel(name.includes('구')?9:10);
    }
  }, {size:5});
}

function mSearchCat2(btn, catName, keywords) {
  if (mCurCatBtn2===btn && btn.classList.contains('active')) { mClearCat2(); return; }
  document.querySelectorAll('.m-cat-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  mCurCatBtn2 = btn;
  mCurCat2 = keywords;
  mCurCatName2 = catName;
  mMobMarkers.search.forEach(function(m){m.setMap(null);});
  mMobMarkers.search = [];
  mDoSearch2(keywords);
}

function mDoSearch2(keywords) {
  mMobMarkers.search.forEach(function(m){m.setMap(null);});
  mMobMarkers.search = [];
  var center = mMap2.getCenter();
  var minLat=34.3, maxLat=35.95, minLng=126.1, maxLng=127.9;
  var opts = { location:center, radius:5000, size:15 };
  var ps3 = new kakao.maps.services.Places();

  keywords.forEach(function(kw) {
    ps3.keywordSearch(kw, function(result, status) {
      if (status!==kakao.maps.services.Status.OK) return;
      result.forEach(function(place) {
        var lat=parseFloat(place.y), lng=parseFloat(place.x);
        if (lat<minLat||lat>maxLat||lng<minLng||lng>maxLng) return;
        var dup = mMobMarkers.search.some(function(m){
          var p=m.getPosition();
          return Math.abs(p.getLat()-lat)<0.0001&&Math.abs(p.getLng()-lng)<0.0001;
        });
        if (dup) return;
        var emoji = CAT_EMOJI[mCurCatName2]||'📍';
        var m = mMakeEmojiMarker2(lat, lng, emoji);
        (function(pl, plLat, plLng){
          kakao.maps.event.addListener(m, 'click', function(){
            if(mCurIW2){try{mCurIW2.close();}catch(e){try{mCurIW2.setMap(null);}catch(e2){}} mCurIW2=null;}
            var addr2 = pl.road_address_name||pl.address_name;
            var hours2 = pl.opening_hours||'';
            var content = buildProspectIW_mobile(pl.place_name, addr2, mCurCatName2, plLat, plLng, false, false, '', hours2);
            mCurIW2 = new kakao.maps.InfoWindow({content:content, removable:true});
            mCurIW2.open(mMap2, m);
          });
        })(place, lat, lng);
        mMobMarkers.search.push(m);
      });
    }, opts);
  });
}

function mClearCat2() {
  mCurCat2=null; mCurCatBtn2=null;
  mMobMarkers.search.forEach(function(m){m.setMap(null);});
  mMobMarkers.search=[];
  document.querySelectorAll('.m-cat-btn').forEach(function(b){b.classList.remove('active');});
}

function mAddCatToRoute2() {
  if (!window._mCurPlace2) return;
  var p = window._mCurPlace2;
  searchSelected.push({거래처명:p.name, 주소:p.addr, 위도:p.lat, 경도:p.lng, _pid:'mp2_'+Math.random().toString(36).substr(2,6)});
  mUpdateRouteCount2();
  mRenderRoute2();
  if(mCurIW2){try{mCurIW2.close();}catch(e){try{mCurIW2.setMap(null);}catch(e2){}} mCurIW2=null;}
  mSwitchTab('route');
}

async function mRegisterProspect2() {
  if (!window._mCurPlace2) return;
  var p = window._mCurPlace2;
  var user = window.AZ_USER||localStorage.getItem('az_user')||'AZ';
  try {
    await fetch(WEBAPP_URL, {method:'POST',mode:'no-cors',body:JSON.stringify({action:'addProspect',name:p.name,address:p.addr,category:p.cat,lat:p.lat,lng:p.lng,registeredBy:user})});
    alert('등록 완료');
  } catch(e) { alert('등록 실패'); }
  if(mCurIW2){try{mCurIW2.close();}catch(e){try{mCurIW2.setMap(null);}catch(e2){}} mCurIW2=null;}
}

async function mLoadProspectMarkers2() {
  try {
    var res = await fetch(WEBAPP_URL+'?action=getProspects');
    var json = await res.json();
    if (!json.success||!json.data.length) return;
    json.data.forEach(function(item) {
      var lat=parseFloat(item['위도']), lng=parseFloat(item['경도']);
      if (!lat||!lng) return;
      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"><circle cx="8" cy="8" r="6" fill="#e84444" stroke="#f59e0b" stroke-width="2"/></svg>';
      var blob = new Blob([svg],{type:'image/svg+xml'});
      var url = URL.createObjectURL(blob);
      var m = new kakao.maps.Marker({
        position:new kakao.maps.LatLng(lat,lng), map:mMap2,
        image:new kakao.maps.MarkerImage(url,new kakao.maps.Size(16,16),{offset:new kakao.maps.Point(8,8)})
      });
      (function(it, iLat2, iLng2){
        kakao.maps.event.addListener(m,'click',function(){
          if(mCurIW2){try{mCurIW2.close();}catch(e){try{mCurIW2.setMap(null);}catch(e2){}} mCurIW2=null;}
          var cat3 = it['카테고리']||'신규영업처';
          var vis3 = it['방문여부']===true||it['방문여부']==='TRUE';
          var mem3 = it['메모']||'';
          var content3 = buildProspectIW_mobile(it['업체명']||'', it['주소']||'', cat3, iLat2, iLng2, true, vis3, mem3, '');
          mCurIW2=new kakao.maps.InfoWindow({content:content3,removable:true});
          mCurIW2.open(mMap2,m);
        });
      })(item, lat, lng);
      mMobMarkers.prospect.push(m);
    });
  } catch(e) {}
}

function mRenderSearch() {
  var q = document.getElementById('m-srch').value.toLowerCase().trim();
  var el = document.getElementById('m-search-list');
  if (!q || q.length < 2) { el.innerHTML='<div class="m-empty">2글자 이상 입력하세요</div>'; return; }
  var myName = window.AZ_USER||localStorage.getItem('az_user')||'';
  var types = mSrchFilter_val==='all' ? ['active','new','dormant'] : [mSrchFilter_val];
  var typeColors = {active:'#3b82f6',new:'#27ae60',dormant:'#888'};
  var typeLabels = {active:'기존',new:'신규',dormant:'휴면'};
  var typeBgs = {active:'rgba(59,130,246,.15)',new:'rgba(39,174,96,.15)',dormant:'rgba(136,136,136,.15)'};
  var results = [];
  types.forEach(function(t){
    if (!data[t]) return;
    data[t].filter(function(r){return (r['거래처명']||'').toLowerCase().includes(q);})
      .forEach(function(r){results.push(Object.assign({},r,{_mtype:t}));});
  });
  var mine = results.filter(function(r){return myName&&(r['담당자']||'').includes(myName);});
  var others = results.filter(function(r){return !myName||!(r['담당자']||'').includes(myName);});
  results = mine.concat(others);
  if (!results.length) { el.innerHTML='<div class="m-empty">검색 결과 없음</div>'; return; }
  el.innerHTML = results.slice(0,20).map(function(item){
    var t = item._mtype;
    var idx = data[t].findIndex(function(r){return r['거래처명']===item['거래처명']&&r['주소']===item['주소'];});
    var sid = t+'_'+idx;
    var isSel = selected.some(function(s){return s._sid===sid;});
    var isMine2 = myName&&(item['담당자']||'').includes(myName);
    return '<div class="m-cust-item" onclick="mSelectFromSearch2(\''+t+'\','+idx+')">'
      +'<div class="m-chk'+(isSel?' checked':'')+'">'+(isSel?'✓':'')+'</div>'
      +'<div class="m-cust-info">'
      +'<div class="m-cust-name">'+(isMine2?'⭐ ':'')+item['거래처명']+'</div>'
      +'<div class="m-cust-sub">'+(item['주소']||'')+(item['담당자']?' · '+item['담당자']:'')+'</div>'
      +'</div>'
      +'<span class="m-badge" style="background:'+typeBgs[t]+';color:'+typeColors[t]+'">'+typeLabels[t]+'</span>'
      +'</div>';
  }).join('');
}

function mSelectFromSearch2(type, idx) {
  var item = data[type][idx];
  var sid = type+'_'+idx;
  item._sid = sid;
  var pos = selected.findIndex(function(s){return s._sid===sid;});
  if (pos>=0) selected.splice(pos,1);
  else selected.push(item);
  var lat = parseFloat(item['위도']);
  var lng = parseFloat(item['경도']);
  if (lat&&lng) {
    mMap2.setCenter(new kakao.maps.LatLng(lat,lng));
    mMap2.setLevel(6);
    mSwitchTab('map');
  }
  mUpdateRouteCount2();
  mRenderSearch();
  mRenderRoute2();
}

function mSearchFilter2(f) {
  mSrchFilter_val = f;
  ['all','active','new','dormant'].forEach(function(t){
    var el = document.getElementById('m-srch-'+t);
    if (el) el.classList.toggle('active', t===f);
  });
  mRenderSearch();
}

function mPlanFilter2(f) {
  mPlanFilter_val = f;
  var all = document.getElementById('m-plan-all');
  var todo = document.getElementById('m-plan-todo');
  if (all) all.classList.toggle('active', f==='all');
  if (todo) todo.classList.toggle('active', f==='todo');
  mRenderPlanList2();
}

function mUpdatePlanProgress2() {
  var done = mPlanData.filter(function(r){return r['방문완료']===true||r['방문완료']==='TRUE';}).length;
  var total = mPlanData.length;
  var pt = document.getElementById('m-plan-progress-text');
  if (pt) pt.textContent = done+'/'+total+' 완료';
  var pf = document.getElementById('m-progress-fill');
  if (pf) pf.style.width = (total?(done/total*100):0)+'%';
}

function mRenderPlanList2() {
  var el = document.getElementById('m-plan-list');
  if (!el) return;
  var items = mPlanFilter_val==='todo'
    ? mPlanData.filter(function(r){return r['방문완료']!==true&&r['방문완료']!=='TRUE';})
    : mPlanData;
  if (!items.length) { el.innerHTML='<div class="m-empty">'+( mPlanFilter_val==='todo'?'미완료 항목이 없습니다':'오늘 영업계획이 없습니다')+'</div>'; return; }
  el.innerHTML = items.map(function(item,i){
    var done = item['방문완료']===true||item['방문완료']==='TRUE';
    var nameEsc = item['거래처명'].replace(/'/g,"\'");
    return '<div class="m-plan-item" onclick="mToggleVisit2(\''+nameEsc+'\','+i+')">'
      +'<div class="m-visit-circle'+(done?' done':'')+'">'+(done?'✓':'')+'</div>'
      +'<div class="m-plan-info">'
      +'<div class="m-plan-name '+(done?'done':'')+'">'+item['No']+'. '+item['거래처명']+'</div>'
      +'<div class="m-plan-addr">'+(item['주소']||'')+'</div>'
      +'</div>'
      +'<span class="m-badge" style="background:rgba(92,110,248,.15);color:#5c6ef8;font-size:10px">'+(item['유형']||'기존')+'</span>'
      +'</div>';
  }).join('');
}

async function mToggleVisit2(name, idx) {
  var item = mPlanData.find(function(r){return r['거래처명']===name;});
  if (!item) return;
  var wasVisited = item['방문완료']===true||item['방문완료']==='TRUE';
  item['방문완료'] = !wasVisited;
  mUpdatePlanProgress2();
  mRenderPlanList2();
  var user = window.AZ_USER||localStorage.getItem('az_user')||'AZ';
  try {
    await fetch(WEBAPP_URL, {method:'POST',mode:'no-cors',body:JSON.stringify({action:'updateVisit',user:user,name:name,visited:!wasVisited})});
  } catch(e) {}
}

async function mLoadPlan2() {
  var user = window.AZ_USER||localStorage.getItem('az_user');
  if (!user) { alert('로그인이 필요합니다.'); return; }
  try {
    var res = await fetch(WEBAPP_URL+'?action=loadPlan&user='+encodeURIComponent(user));
    var json = await res.json();
    if (!json.success||!json.data.length) { alert('오늘 저장된 영업계획이 없습니다.'); return; }
    mPlanData = json.data;
    mUpdatePlanProgress2();
    mRenderPlanList2();
  } catch(e) { alert('불러오기 실패: '+e.message); }
}

async function mSubmitForm2() {
  var name = document.getElementById('m-form-name').value.trim();
  var addr = document.getElementById('m-form-addr').value.trim();
  var cat  = document.getElementById('m-form-cat').value;
  var user = window.AZ_USER||localStorage.getItem('az_user')||'AZ';
  if (!name||!addr) { alert('업체명과 주소를 입력해주세요.'); return; }
  var geocoder3 = new kakao.maps.services.Geocoder();
  geocoder3.addressSearch(addr, async function(result, status) {
    var lat='', lng='';
    if (status===kakao.maps.services.Status.OK) { lat=result[0].y; lng=result[0].x; }
    try {
      await fetch(WEBAPP_URL, {method:'POST',mode:'no-cors',body:JSON.stringify({action:'addProspect',name:name,address:addr,category:cat,lat:lat,lng:lng,registeredBy:user})});
      alert('등록 완료');
      document.getElementById('m-form-name').value='';
      document.getElementById('m-form-addr').value='';
      document.getElementById('m-add-form').classList.remove('open');
      if (lat&&lng&&mMap2) {
        mMap2.setCenter(new kakao.maps.LatLng(lat,lng));
        mSwitchTab('map');
      }
    } catch(e) { alert('등록 실패'); }
  });
}

// GPS - 모바일용 (기존 goToMyLocation 재활용하되 mMap2 사용)
function mGoToMyLocation() {
  if (!navigator.geolocation) { alert('GPS를 지원하지 않는 브라우저입니다.'); return; }
  var btn = document.getElementById('m-gps-btn');
  if (btn) btn.textContent = '⏳';
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var lat = pos.coords.latitude;
      var lng = pos.coords.longitude;
      var latlng = new kakao.maps.LatLng(lat, lng);
      if (mMap2) {
        mMap2.setCenter(latlng);
        mMap2.setLevel(6);
      }
      var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><circle cx="10" cy="10" r="8" fill="#3b82f6" stroke="white" stroke-width="2" opacity="0.9"/><circle cx="10" cy="10" r="3" fill="white"/></svg>';
      var blob = new Blob([svg],{type:'image/svg+xml'});
      var url = URL.createObjectURL(blob);
      new kakao.maps.Marker({
        position:latlng, map:mMap2,
        image:new kakao.maps.MarkerImage(url,new kakao.maps.Size(20,20),{offset:new kakao.maps.Point(10,10)})
      });
      if (mCurCat2) mDoSearch2(mCurCat2);
      if (btn) btn.textContent = '📍';
    },
    function(err) {
      if (btn) btn.textContent = '📍';
      alert('위치를 가져올 수 없습니다. 위치 권한을 허용해주세요.');
    },
    {enableHighAccuracy:true, timeout:10000}
  );
}

window.addEventListener('load', function() {
  if (isMobile()) setTimeout(initMobile, 600);
});

window.addEventListener('resize', function() {
  if (isMobile() && !mMap2) setTimeout(initMobile, 300);
});
</script>
